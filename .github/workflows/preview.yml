name: Deploy to Vercel (preview)

# Same secret flow as deploy.yml (1Password -> build-time inline, nothing in
# Vercel's env store) but targets the Vercel *preview* environment. Designed to
# be run locally with nektos/act:
#
#   act workflow_dispatch -W .github/workflows/preview.yml --secret-file .secrets
#
# The full-image pin (Node 20) lives in ./.actrc. On Apple Silicon also add
# `--container-architecture linux/amd64`.
#
# .secrets (gitignored) must contain:
#   OP_SERVICE_ACCOUNT_TOKEN=...
#   VERCEL_TOKEN=...
#   VERCEL_ORG_ID=...
#   VERCEL_PROJECT_ID=...
#
# See deploy.yml for the expected 1Password item layout.

on:
  workflow_dispatch:

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RPC_URL_KATANA: op://webops-prod/katana-apr-service/RPC_URL_KATANA
          KONG_WEBHOOK_SECRET: op://webops-prod/katana-apr-service/KONG_WEBHOOK_SECRET
          COINGECKO_API_KEY: op://webops-prod/katana-apr-service/COINGECKO_API_KEY
          KONG_BASE_URI: op://webops-prod/katana-apr-service/KONG_BASE_URI
          YDAEMON_BASE_URI: op://webops-prod/katana-apr-service/YDAEMON_BASE_URI
          MERKL_BASE_URI: op://webops-prod/katana-apr-service/MERKL_BASE_URI
          MERKL_API_KEY: op://webops-prod/katana-apr-service/MERKL_API_KEY
          COINGECKO_BASE_URI: op://webops-prod/katana-apr-service/COINGECKO_BASE_URI
          COINGECKO_KATANA_COIN_ID: op://webops-prod/katana-apr-service/COINGECKO_KATANA_COIN_ID
          KATANA_APR_SERVICE_API: op://webops-prod/katana-apr-service/KATANA_APR_SERVICE_API

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (inlines 1Password secrets into the output)
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output as a preview
        run: |
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "Preview URL: $url"
          echo "preview-url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
