name: Deploy to Vercel (production)

# Secrets are the source-of-truth in 1Password, loaded here at build time and
# inlined into the Vercel build output via next.config.ts. Nothing is stored in
# Vercel's env dashboard.
#
# Required GitHub Actions secrets:
#   OP_SERVICE_ACCOUNT_TOKEN  - 1Password service account token (read access to the vault below)
#   VERCEL_TOKEN              - Vercel access token
#   VERCEL_ORG_ID             - from `vercel link` / .vercel/project.json
#   VERCEL_PROJECT_ID         - from `vercel link` / .vercel/project.json
#
# Expected 1Password item:
#   vault: webops-prod   item: katana-apr-service
#   fields: RPC_URL_KATANA, KONG_WEBHOOK_SECRET, COINGECKO_API_KEY,
#           KONG_BASE_URI, YDAEMON_BASE_URI, MERKL_BASE_URI, MERKL_API_KEY,
#           COINGECKO_BASE_URI, COINGECKO_KATANA_COIN_ID, KATANA_APR_SERVICE_API

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RPC_URL_KATANA: op://webops-prod/katana-apr-service/RPC_URL_KATANA
          KONG_WEBHOOK_SECRET: op://webops-prod/katana-apr-service/KONG_WEBHOOK_SECRET
          COINGECKO_API_KEY: op://webops-prod/katana-apr-service/COINGECKO_API_KEY
          KONG_BASE_URI: op://webops-prod/katana-apr-service/KONG_BASE_URI
          YDAEMON_BASE_URI: op://webops-prod/katana-apr-service/YDAEMON_BASE_URI
          MERKL_BASE_URI: op://webops-prod/katana-apr-service/MERKL_BASE_URI
          MERKL_API_KEY: op://webops-prod/katana-apr-service/MERKL_API_KEY
          COINGECKO_BASE_URI: op://webops-prod/katana-apr-service/COINGECKO_BASE_URI
          COINGECKO_KATANA_COIN_ID: op://webops-prod/katana-apr-service/COINGECKO_KATANA_COIN_ID
          KATANA_APR_SERVICE_API: op://webops-prod/katana-apr-service/KATANA_APR_SERVICE_API

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (inlines 1Password secrets into the output)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
